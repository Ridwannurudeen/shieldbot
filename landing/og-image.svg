
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a0e1a"/>
      <stop offset="100%" stop-color="#0d1526"/>
    </linearGradient>

    <!-- Neon glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle glow for shield -->
    <filter id="shieldglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Grid pattern -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-width="0.3" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Left neon accent bar -->
  <rect x="0" y="0" width="5" height="630" fill="#00ff88"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1200" height="3" fill="#00ff88" opacity="0.4"/>

  <!-- Glow blob behind shield -->
  <ellipse cx="870" cy="315" rx="220" ry="200" fill="#00ff88" opacity="0.04"/>

  <!-- Shield icon (right side) -->
  <g transform="translate(800, 165)" filter="url(#shieldglow)">
    <!-- Shield shape -->
    <path d="M 140 0 L 280 50 L 280 160 C 280 240 140 300 140 300 C 140 300 0 240 0 160 L 0 50 Z"
          fill="none" stroke="#00ff88" stroke-width="6" opacity="0.9"/>
    <!-- Shield fill -->
    <path d="M 140 0 L 280 50 L 280 160 C 280 240 140 300 140 300 C 140 300 0 240 0 160 L 0 50 Z"
          fill="#00ff88" opacity="0.06"/>
    <!-- Checkmark inside shield -->
    <polyline points="75,155 120,205 210,115"
              fill="none" stroke="#00ff88" stroke-width="18"
              stroke-linecap="round" stroke-linejoin="round" opacity="0.95"/>
  </g>

  <!-- SHIELDBOT wordmark -->
  <text x="80" y="210" font-family="'Arial Black', Arial, sans-serif"
        font-size="88" font-weight="900" letter-spacing="-2" fill="#00ff88">
    Shield
  </text>
  <text x="80" y="210" font-family="'Arial Black', Arial, sans-serif"
        font-size="88" font-weight="900" letter-spacing="-2"
        fill="transparent" stroke="#00ff88" stroke-width="1" opacity="0.3">
    Shield
  </text>
  <!-- "Bot" in white -->
  <text x="80" y="310" font-family="'Arial Black', Arial, sans-serif"
        font-size="88" font-weight="900" letter-spacing="-2" fill="#ffffff">
    Bot
  </text>

  <!-- Tagline -->
  <text x="80" y="375" font-family="Arial, sans-serif"
        font-size="26" font-weight="400" fill="#9ca3af" letter-spacing="0.5">
    Real-Time Web3 Transaction Security Firewall
  </text>

  <!-- Feature pills -->
  <g transform="translate(80, 415)">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="195" height="38" rx="19" fill="#00ff88" fill-opacity="0.1" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
    <text x="98" y="24" font-family="Arial, sans-serif" font-size="14" font-weight="600"
          fill="#00ff88" text-anchor="middle">Rug Pull Detection</text>

    <!-- Pill 2 -->
    <rect x="210" y="0" width="175" height="38" rx="19" fill="#00ff88" fill-opacity="0.1" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
    <text x="297" y="24" font-family="Arial, sans-serif" font-size="14" font-weight="600"
          fill="#00ff88" text-anchor="middle">Phishing Blocker</text>

    <!-- Pill 3 -->
    <rect x="400" y="0" width="200" height="38" rx="19" fill="#00ff88" fill-opacity="0.1" stroke="#00ff88" stroke-width="1" stroke-opacity="0.4"/>
    <text x="500" y="24" font-family="Arial, sans-serif" font-size="14" font-weight="600"
          fill="#00ff88" text-anchor="middle">AI Contract Audit</text>
  </g>

  <!-- Divider line -->
  <line x1="80" y1="490" x2="720" y2="490" stroke="#ffffff" stroke-width="1" opacity="0.08"/>

  <!-- Bottom row: domain + chain count -->
  <text x="80" y="530" font-family="Arial, sans-serif"
        font-size="20" fill="#4b5563">
    shieldbotsecurity.online
  </text>
  <text x="720" y="530" font-family="Arial, sans-serif"
        font-size="20" fill="#4b5563" text-anchor="end">
    7 chains supported
  </text>

  <!-- Risk score badge (decorative) -->
  <g transform="translate(1060, 490)">
    <circle cx="0" cy="0" r="55" fill="#0d1526" stroke="#00ff88" stroke-width="2" opacity="0.8"/>
    <text x="0" y="-8" font-family="Arial, sans-serif" font-size="13" fill="#9ca3af"
          text-anchor="middle">RISK</text>
    <text x="0" y="18" font-family="'Arial Black', Arial, sans-serif" font-size="26"
          font-weight="900" fill="#00ff88" text-anchor="middle">12</text>
    <text x="0" y="36" font-family="Arial, sans-serif" font-size="11" fill="#9ca3af"
          text-anchor="middle">LOW</text>
  </g>
</svg>
