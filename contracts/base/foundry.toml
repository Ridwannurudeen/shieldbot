[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"

remappings = [
    "@openzeppelin/=lib/openzeppelin-contracts/",
    "@eas/=lib/eas-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[rpc_endpoints]
base = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"

[etherscan]
# Etherscan v2 unified API: any chain's API key (BscScan/BaseScan/Etherscan) works across all chains.
base = { key = "${ETHERSCAN_V2_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=8453", chain = 8453 }
base_sepolia = { key = "${ETHERSCAN_V2_API_KEY}", url = "https://api.etherscan.io/v2/api?chainid=84532", chain = 84532 }
