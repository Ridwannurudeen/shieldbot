<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 14px 16px;
      background: #1e293b;
      border-bottom: 1px solid #334155;
      flex-shrink: 0;
    }
    .header .logo { font-size: 22px; }
    .header h1 { font-size: 14px; font-weight: 600; color: #f8fafc; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }

    .chat-bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .chat-bubble.user {
      align-self: flex-end;
      background: #3b82f6;
      color: #ffffff;
      border-bottom-right-radius: 4px;
    }
    .chat-bubble.assistant {
      align-self: flex-start;
      background: #334155;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    #typing {
      display: none;
      align-items: center;
      gap: 6px;
      padding: 0 16px 8px;
      font-size: 12px;
      color: #64748b;
      flex-shrink: 0;
    }
    .typing-dots {
      display: flex;
      gap: 3px;
    }
    .typing-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #64748b;
      animation: typingPulse 1.4s ease-in-out infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typingPulse {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
      40% { transform: scale(1); opacity: 1; }
    }

    .input-area {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      background: #1e293b;
      border-top: 1px solid #334155;
      flex-shrink: 0;
    }
    #chatInput {
      flex: 1;
      padding: 10px 12px;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      color: #f8fafc;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      resize: none;
    }
    #chatInput:focus { border-color: #3b82f6; }
    #chatInput::placeholder { color: #475569; }
    #sendBtn {
      padding: 10px 16px;
      background: #3b82f6;
      border: none;
      border-radius: 8px;
      color: #ffffff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #sendBtn:hover { background: #2563eb; }
    #sendBtn:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo">&#128737;</div>
    <h1>ShieldBot AI</h1>
  </div>

  <div id="messages"></div>

  <div id="typing">
    <div class="typing-dots">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
    <span>ShieldBot is thinking...</span>
  </div>

  <div class="input-area">
    <input type="text" id="chatInput" placeholder="Ask about a token, contract, or threat...">
    <button id="sendBtn">Send</button>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
