server {
    server_name shieldbotsecurity.online www.shieldbotsecurity.online;
    root /opt/shieldbot/landing;
    index index.html;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; frame-src https://www.youtube.com; connect-src 'self' https://api.shieldbotsecurity.online; font-src 'self';" always;

    location = /dashboard {
        return 301 https://api.shieldbotsecurity.online/dashboard;
    }

    location /api/ {
        return 301 https://api.shieldbotsecurity.online$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/shieldbotsecurity.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shieldbotsecurity.online/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 80;
    server_name shieldbotsecurity.online www.shieldbotsecurity.online;
    return 301 https://$host$request_uri;
}
