name: Security and Tests

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  python:
    name: Python tests and security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install bandit pip-audit

      - name: Dependency audit
        run: |
          python -m pip_audit -r requirements.txt --progress-spinner off --timeout 10

      - name: Static security scan
        run: |
          python -m bandit -r . \
            --severity-level medium \
            --confidence-level medium \
            --exclude ./.git,./tests,./eval,./demo,./landing/assets

      - name: Test suite
        run: |
          python -m pytest -q

  solidity:
    name: Solidity security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Slither
        run: |
          python -m pip install --upgrade pip
          python -m pip install slither-analyzer solc-select

      - name: Install Solidity compiler
        run: |
          solc-select install 0.8.24
          solc-select install 0.8.28
          solc-select use 0.8.24

      - name: Slither — BSC verifier
        run: |
          slither contracts/ShieldBotVerifier.sol --exclude-informational --fail-high

      - name: Slither — Base attestor
        run: |
          solc-select use 0.8.28
          slither contracts/base/src/ShieldBotAttestor.sol \
            --solc-remaps "@openzeppelin/=contracts/base/lib/openzeppelin-contracts/ @eas/=contracts/base/lib/eas-contracts/contracts/ forge-std/=contracts/base/lib/forge-std/src/" \
            --exclude-informational --fail-high

  foundry:
    name: Foundry tests (Base attestor)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/base
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vv

      - name: Format check
        run: forge fmt --check

  sdk:
    name: SDK audit and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: sdk/package-lock.json

      - name: Install SDK dependencies
        run: npm ci

      - name: SDK dependency audit
        run: npm audit --audit-level=moderate

      - name: SDK type check
        run: npm run lint

      - name: SDK build
        run: npm run build
